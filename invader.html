<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Space Invaders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
    }
    #hud {
      display: flex;
      gap: 3rem;
      margin-bottom: 0.5rem;
      font-size: 1rem;
      letter-spacing: 2px;
    }
    #hud span { color: #0ff; }
    canvas {
      border: 1px solid #333;
      background: #000;
      display: block;
    }
    #message {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 1px;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      pointer-events: none;
    }
    #overlay h2 { font-size: 2.5rem; letter-spacing: 4px; }
    #overlay p  { font-size: 1rem; color: #aaa; }
  </style>
</head>
<body>

<div id="hud">SCORE: <span id="scoreVal">0</span> &nbsp; LIVES: <span id="livesVal">3</span></div>
<canvas id="c" width="700" height="520"></canvas>
<div id="message">← → MOVE &nbsp;|&nbsp; SPACE SHOOT &nbsp;|&nbsp; R RESTART</div>

<div id="overlay">
  <h2 id="overlayTitle"></h2>
  <p id="overlaySub"></p>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const INVADER_ROWS  = 3;
const INVADER_COLS  = 10;
const INV_W = 36, INV_H = 24, INV_GAP_X = 14, INV_GAP_Y = 18;
const INVADER_COLORS = ['#ff00ff', '#ffff00', '#00ffff']; // magenta, yellow, cyan
const BULLET_SPEED  = 7;
const PLAYER_SPEED  = 5;
const SHIP_W = 44, SHIP_H = 28;

let score, lives, state; // state: 'play' | 'win' | 'lose'
let player, bullets, invaders, invaderSpeed, invaderDir;
let keys = {};

function init() {
  score = 0;
  lives = 3;
  state = 'play';
  document.getElementById('overlayTitle').textContent = '';
  document.getElementById('overlaySub').textContent  = '';

  player = { x: W / 2, y: H - 50, w: SHIP_W, h: SHIP_H, cooldown: 0 };
  bullets = [];

  invaderDir   = 1;
  invaderSpeed = 0.4;
  invaders = [];

  const totalW = INVADER_COLS * INV_W + (INVADER_COLS - 1) * INV_GAP_X;
  const startX = (W - totalW) / 2;
  const startY = 40;

  for (let r = 0; r < INVADER_ROWS; r++) {
    for (let c = 0; c < INVADER_COLS; c++) {
      invaders.push({
        x: startX + c * (INV_W + INV_GAP_X),
        y: startY + r * (INV_H + INV_GAP_Y),
        w: INV_W, h: INV_H,
        color: INVADER_COLORS[r],
        alive: true,
        animTick: Math.random() * Math.PI * 2
      });
    }
  }

  updateHUD();
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('livesVal').textContent = lives;
}

// ── Drawing helpers ──────────────────────────────────────────────
function drawShip(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Body
  ctx.fillStyle = '#4af';
  ctx.beginPath();
  ctx.moveTo(0, -SHIP_H / 2);
  ctx.lineTo(SHIP_W / 2, SHIP_H / 2);
  ctx.lineTo(-SHIP_W / 2, SHIP_H / 2);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#9ef';
  ctx.beginPath();
  ctx.arc(0, 0, 7, 0, Math.PI * 2);
  ctx.fill();

  // Engine glow
  ctx.fillStyle = '#f80';
  ctx.fillRect(-6, SHIP_H / 2 - 4, 12, 6);

  ctx.restore();
}

function drawInvader(inv) {
  ctx.save();
  ctx.translate(inv.x + inv.w / 2, inv.y + inv.h / 2);

  const pulse = Math.sin(inv.animTick) * 1.5;
  ctx.fillStyle = inv.color;
  ctx.shadowColor = inv.color;
  ctx.shadowBlur = 8 + pulse;

  // Body
  ctx.fillRect(-inv.w / 2 + 4, -inv.h / 2 + 4, inv.w - 8, inv.h - 8);

  // Antennae
  ctx.fillRect(-inv.w / 2 + 2, -inv.h / 2, 3, 6);
  ctx.fillRect(inv.w / 2 - 5, -inv.h / 2, 3, 6);

  // Legs (alternating)
  const legOff = Math.sin(inv.animTick) > 0 ? 4 : 0;
  ctx.fillRect(-inv.w / 2, inv.h / 2 - 6 + legOff, 5, 6);
  ctx.fillRect(inv.w / 2 - 5, inv.h / 2 - 6 - legOff, 5, 6);

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(-6, -4, 4, 4);
  ctx.fillRect(2, -4, 4, 4);

  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.fillStyle = '#0f0';
  ctx.shadowColor = '#0f0';
  ctx.shadowBlur = 6;
  ctx.fillRect(b.x - 2, b.y - 8, 4, 14);
  ctx.restore();
}

function drawStars() {
  // simple static stars
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  // seed-based so they don't flicker
  for (let i = 0; i < 80; i++) {
    const sx = ((i * 173 + 37) % W);
    const sy = ((i * 97  + 53) % H);
    ctx.fillRect(sx, sy, 1, 1);
  }
}

// ── Game loop ────────────────────────────────────────────────────
let last = 0;
function loop(ts) {
  const dt = Math.min(ts - last, 50);
  last = ts;

  ctx.clearRect(0, 0, W, H);
  drawStars();

  if (state === 'play') update(dt);
  render();

  requestAnimationFrame(loop);
}

function update(dt) {
  // Player movement
  if (keys['ArrowLeft'])  player.x = Math.max(player.x - PLAYER_SPEED, SHIP_W / 2);
  if (keys['ArrowRight']) player.x = Math.min(player.x + PLAYER_SPEED, W - SHIP_W / 2);

  // Shoot
  if (player.cooldown > 0) player.cooldown -= dt;
  if (keys[' '] && player.cooldown <= 0) {
    bullets.push({ x: player.x, y: player.y - SHIP_H / 2 });
    player.cooldown = 300;
  }

  // Move bullets
  bullets = bullets.filter(b => b.y > -10);
  bullets.forEach(b => b.y -= BULLET_SPEED);

  // Move invaders
  const alive = invaders.filter(i => i.alive);
  if (alive.length === 0) { endGame('win'); return; }

  let hitWall = false;
  alive.forEach(inv => {
    inv.x += invaderSpeed * invaderDir;
    inv.animTick += 0.05;
    if (inv.x < 0 || inv.x + inv.w > W) hitWall = true;
  });
  if (hitWall) {
    invaderDir *= -1;
    alive.forEach(inv => {
      inv.x += invaderSpeed * invaderDir * 2;
      inv.y += 12;
    });
  }

  // Bullet ↔ invader collision
  bullets.forEach((b, bi) => {
    invaders.forEach(inv => {
      if (!inv.alive) return;
      if (b.x > inv.x && b.x < inv.x + inv.w && b.y > inv.y && b.y < inv.y + inv.h) {
        inv.alive = false;
        bullets.splice(bi, 1);
        score += 10;
        invaderSpeed = Math.min(invaderSpeed + 0.04, 3);
        updateHUD();
      }
    });
  });

  // Invader reaches player
  const playerTop = player.y - SHIP_H / 2;
  for (const inv of alive) {
    if (inv.y + inv.h >= playerTop) {
      endGame('lose');
      return;
    }
  }
}

function render() {
  // Draw invaders
  invaders.forEach(inv => { if (inv.alive) drawInvader(inv); });

  // Draw bullets
  bullets.forEach(drawBullet);

  // Draw player
  drawShip(player.x, player.y);

  // Overlay text for win/lose
  if (state === 'win' || state === 'lose') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
  }
}

function endGame(result) {
  state = result;
  const title = document.getElementById('overlayTitle');
  const sub   = document.getElementById('overlaySub');
  if (result === 'win') {
    title.style.color = '#0f0';
    title.textContent = 'YOU WIN!';
    sub.textContent   = `Score: ${score} — Press R to play again`;
  } else {
    title.style.color = '#f00';
    title.textContent = 'GAME OVER';
    sub.textContent   = `Score: ${score} — Press R to play again`;
  }
}

// ── Input ────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
  if (e.key === 'r' || e.key === 'R') init();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// ── Start ────────────────────────────────────────────────────────
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
